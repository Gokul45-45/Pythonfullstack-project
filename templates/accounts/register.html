{% extends 'base.html' %}

{% block title %}Register - LMS{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="auth-card animate-fade-in">
                    <div class="auth-logo">
                        <i class="bi bi-mortarboard-fill"></i> LMS
                    </div>
                    <h4 class="text-center mb-2 fw-bold">Create Account</h4>
                    <p class="text-muted text-center mb-4">Join our learning community today</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" name="first_name" class="form-control" placeholder="First name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" name="last_name" class="form-control" placeholder="Last name" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-person text-muted"></i>
                                </span>
                                <input type="text" name="username" class="form-control border-start-0" placeholder="Choose a username" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-envelope text-muted"></i>
                                </span>
                                <input type="email" name="email" class="form-control border-start-0" placeholder="Enter your email" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">I am a</label>
                            <div class="row g-2">
                                <div class="col-4">
                                    <input type="radio" class="btn-check" name="role" id="role_student" value="student" checked>
                                    <label class="btn btn-outline-primary w-100" for="role_student">
                                        <i class="bi bi-book"></i> Student
                                    </label>
                                </div>
                                <div class="col-4">
                                    <input type="radio" class="btn-check" name="role" id="role_instructor" value="instructor">
                                    <label class="btn btn-outline-primary w-100" for="role_instructor">
                                        <i class="bi bi-person-workspace"></i> Instructor
                                    </label>
                                </div>
                                <div class="col-4">
                                    <input type="radio" class="btn-check" name="role" id="role_admin" value="admin">
                                    <label class="btn btn-outline-primary w-100" for="role_admin">
                                        <i class="bi bi-shield-check"></i> Admin
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock text-muted"></i>
                                </span>
                                <input type="password" name="password1" class="form-control border-start-0" placeholder="Create password" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock-fill text-muted"></i>
                                </span>
                                <input type="password" name="password2" class="form-control border-start-0" placeholder="Confirm password" required>
                            </div>
                        </div>
                        <div class="form-check mb-4">
                            <input type="checkbox" class="form-check-input" id="terms" required>
                            <label class="form-check-label text-muted" for="terms">
                                I agree to the <a href="#" class="text-primary">Terms of Service</a> and <a href="#" class="text-primary">Privacy Policy</a>
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-person-plus me-2"></i>Create Account
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted mb-0">Already have an account? <a href="{% url 'login' %}" class="text-primary fw-semibold text-decoration-none">Sign in</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
