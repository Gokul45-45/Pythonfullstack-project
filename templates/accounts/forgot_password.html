{% extends 'base.html' %}

{% block title %}Forgot Password - LMS{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="auth-card animate-fade-in">
                    <div class="auth-logo">
                        <i class="bi bi-mortarboard-fill"></i> LMS
                    </div>
                    <h4 class="text-center mb-4 fw-bold">Forgot Password?</h4>
                    <p class="text-muted text-center mb-4">Enter your email address and we'll send you a link to reset
                        your password.</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-envelope text-muted"></i>
                                </span>
                                <input type="email" name="email" class="form-control border-start-0"
                                    placeholder="name@example.com" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                            <i class="bi bi-send me-2"></i>Send Reset Link
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-muted mb-0">Remember your password? <a href="{% url 'login' %}"
                                class="text-primary fw-semibold text-decoration-none">Back to Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
