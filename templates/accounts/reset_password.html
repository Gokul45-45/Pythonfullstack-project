{% extends 'base.html' %}

{% block title %}Reset Password - LMS{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="auth-card animate-fade-in">
                    <div class="auth-logo">
                        <i class="bi bi-mortarboard-fill"></i> LMS
                    </div>
                    <h4 class="text-center mb-4 fw-bold">Reset Password</h4>
                    <p class="text-muted text-center mb-4">Enter your new password below.</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock text-muted"></i>
                                </span>
                                <input type="password" name="password" class="form-control border-start-0"
                                    placeholder="••••••••" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Confirm New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock-fill text-muted"></i>
                                </span>
                                <input type="password" name="confirm_password" class="form-control border-start-0"
                                    placeholder="••••••••" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                            <i class="bi bi-check-circle me-2"></i>Reset Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
