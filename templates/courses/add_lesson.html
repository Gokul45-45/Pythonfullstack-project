{% extends 'base.html' %}

{% block title %}Add Lesson - LMS{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="fw-bold mb-0"><i class="bi bi-plus-circle me-2"></i>Add Lesson to {{ course.title }}</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Lesson Title</label>
                            <input type="text" name="title" class="form-control" placeholder="Enter lesson title" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="2" placeholder="Brief description of the lesson"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Content</label>
                            <textarea name="content" class="form-control" rows="8" placeholder="Lesson content (supports HTML)" required></textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Video URL (optional)</label>
                                <input type="url" name="video_url" class="form-control" placeholder="https://...">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Duration (min)</label>
                                <input type="number" name="duration" class="form-control" value="30" min="1">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Order</label>
                                <input type="number" name="order" class="form-control" value="0" min="0">
                            </div>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-2"></i>Add Lesson
                            </button>
                            <a href="{% url 'edit_course' course.id %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
