{% extends 'base.html' %}

{% block title %}Add Material - LMS{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white p-4">
                    <h4 class="fw-bold mb-0">Add Material to: {{ lesson.title }}</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Material Title</label>
                            <input type="text" name="title" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Type</label>
                            <select name="material_type" class="form-select" required>
                                <option value="pdf">PDF Document</option>
                                <option value="video">Video</option>
                                <option value="link">External Link</option>
                                <option value="file">File</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">File (Optional)</label>
                            <input type="file" name="file" class="form-control">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">URL (Optional)</label>
                            <input type="url" name="url" class="form-control" placeholder="https://...">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">Add Material</button>
                            <a href="{% url 'edit_lesson' lesson.id %}" class="btn btn-light px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
